<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LegalEase India</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F0E8;
      --parchment: #EDE5D0;
      --ink: #1A1208;
      --gold: #C9963A;
      --gold-light: #E8B85A;
      --rust: #8B3A2A;
      --sage: #4A6741;
      --muted: #7A6E5F;
      --border: #D4C9B0;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(201,150,58,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,58,42,0.05) 0%, transparent 50%);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--parchment); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    /* Layout */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Header */
    .header {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(245,240,232,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-emblem {
      width: 40px;
      height: 40px;
      background: var(--ink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--gold); }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* Nav Tabs */
    .nav-tabs {
      display: flex;
      gap: 4px;
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .nav-tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-tab.active {
      background: var(--ink);
      color: var(--cream);
    }

    .nav-tab:hover:not(.active) {
      background: var(--border);
      color: var(--ink);
    }

    /* Hero Section */
    .hero {
      padding: 60px 40px 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 16px;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .hero-title .accent {
      color: var(--gold);
      font-style: italic;
    }

    .hero-subtitle {
      font-size: 16px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto 32px;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--parchment);
      margin-bottom: 0;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Main Content */
    .main {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 40px 60px;
    }

    /* Section Panels */
    .panel {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(26,18,8,0.06);
    }

    .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--parchment);
    }

    .panel-icon {
      width: 32px;
      height: 32px;
      background: var(--ink);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--gold);
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
    }

    .panel-desc {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    /* Chat Area */
    .chat-area {
      height: 380px;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 40px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 14px;
      font-weight: 300;
    }

    .suggested-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggested-q {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--ink);
      cursor: pointer;
      background: var(--parchment);
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .suggested-q:hover {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }

    /* Messages */
    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .msg-avatar { background: var(--ink); }
    .message.bot .msg-avatar { background: var(--gold); }

    .msg-bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .msg-bubble {
      background: var(--ink);
      color: var(--cream);
      border-bottom-right-radius: 4px;
    }

    .message.bot .msg-bubble {
      background: var(--parchment);
      color: var(--ink);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-sources {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .source-tag {
      padding: 2px 8px;
      background: rgba(201,150,58,0.15);
      border: 1px solid rgba(201,150,58,0.3);
      border-radius: 4px;
      font-size: 11px;
      color: var(--rust);
      font-weight: 500;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input Area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      background: white;
    }

    .input-field {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--cream);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .input-field:focus { border-color: var(--gold); }
    .input-field::placeholder { color: var(--muted); }

    .send-btn {
      padding: 12px 20px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .send-btn:hover:not(:disabled) { background: var(--gold); color: var(--ink); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Upload Panel */
    .upload-area {
      padding: 24px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--cream);
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--gold);
      background: rgba(201,150,58,0.05);
    }

    .drop-icon { font-size: 36px; margin-bottom: 12px; }

    .drop-text {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .drop-hint {
      font-size: 12px;
      color: var(--muted);
    }

    .file-input { display: none; }

    .selected-file {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .file-name { font-weight: 500; }
    .file-size { color: var(--muted); font-size: 12px; }

    /* URL Panel */
    .url-area { padding: 24px; }

    .url-input-row {
      display: flex;
      gap: 10px;
    }

    .url-field {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--cream);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-field:focus { border-color: var(--gold); }

    .action-btn {
      padding: 12px 20px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .action-btn:hover:not(:disabled) { background: var(--gold); color: var(--ink); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .action-btn.secondary {
      background: var(--parchment);
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .action-btn.secondary:hover { background: var(--border); }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    .toast {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      animation: toastIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .toast.success { background: var(--sage); color: white; }
    .toast.error { background: var(--rust); color: white; }
    .toast.info { background: var(--ink); color: var(--cream); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-badge.online { background: rgba(74,103,65,0.15); color: var(--sage); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    /* Horizontal divider with text */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    @media (max-width: 640px) {
      .header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
      .hero { padding: 40px 20px 20px; }
      .main { padding: 24px 20px 40px; }
      .stats-bar { gap: 20px; padding: 16px 20px; flex-wrap: wrap; }
      .nav-tabs { width: 100%; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const API_BASE = window.location.origin;

function Toast({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'}</span>
          {t.message}
        </div>
      ))}
    </div>
  );
}

function ChatTab({ addToast }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  const suggested = [
    "What are my rights as a consumer?",
    "Explain Section 377 of IPC",
    "How do I file an RTI application?",
    "What is the Consumer Protection Act 2019?"
  ];

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  const sendMessage = async (text) => {
    const question = text || input.trim();
    if (!question || loading) return;

    setMessages(prev => [...prev, { role: 'user', text: question }]);
    setInput('');
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed');
      setMessages(prev => [...prev, {
        role: 'bot',
        text: data.answer,
        sources: data.sources || []
      }]);
    } catch (err) {
      addToast(err.message, 'error');
      setMessages(prev => [...prev, {
        role: 'bot',
        text: "Sorry, I couldn't process your query. Please try again.",
        sources: []
      }]);
    } finally {
      setLoading(false);
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-icon">⚖</div>
        <div>
          <div className="panel-title">Legal Assistant</div>
        </div>
        <span className="panel-desc status-badge online">
          <span className="status-dot"></span> Online
        </span>
      </div>

      <div className="chat-area">
        {messages.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">📜</div>
            <div className="empty-text">Ask any question about Indian law</div>
            <div className="suggested-questions">
              {suggested.map(q => (
                <button key={q} className="suggested-q" onClick={() => sendMessage(q)}>{q}</button>
              ))}
            </div>
          </div>
        ) : (
          messages.map((msg, i) => (
            <div key={i} className={`message ${msg.role}`}>
              <div className="msg-avatar">
                {msg.role === 'user' ? '👤' : '⚖'}
              </div>
              <div>
                <div className="msg-bubble">
                  {msg.text}
                  {msg.sources && msg.sources.length > 0 && (
                    <div className="msg-sources">
                      {msg.sources.map(s => (
                        <span key={s} className="source-tag">📄 {s}</span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          ))
        )}

        {loading && (
          <div className="message bot">
            <div className="msg-avatar">⚖</div>
            <div className="typing-indicator">
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      <div className="input-area">
        <textarea
          className="input-field"
          rows={1}
          placeholder="Ask about Indian laws, rights, sections..."
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
        />
        <button className="send-btn" onClick={() => sendMessage()} disabled={!input.trim() || loading}>
          {loading ? '...' : '→ Ask'}
        </button>
      </div>
    </div>
  );
}

function UploadTab({ addToast }) {
  const [file, setFile] = useState(null);
  const [loading, setLoading] = useState(false);
  const [drag, setDrag] = useState(false);
  const fileRef = useRef();

  const handleFile = (f) => {
    if (f && f.type === 'application/pdf') setFile(f);
    else addToast('Please upload a PDF file', 'error');
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setDrag(false);
    handleFile(e.dataTransfer.files[0]);
  };

  const upload = async () => {
    if (!file) return;
    setLoading(true);
    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');
      addToast('PDF uploaded and indexed successfully!', 'success');
      setFile(null);
    } catch (err) {
      addToast(err.message, 'error');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-icon">📄</div>
        <div>
          <div className="panel-title">Upload Legal Document</div>
        </div>
        <span className="panel-desc">PDF only</span>
      </div>

      <div className="upload-area">
        <div
          className={`drop-zone ${drag ? 'drag-over' : ''}`}
          onClick={() => fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={handleDrop}
        >
          <div className="drop-icon">📁</div>
          <div className="drop-text">Drop your PDF here</div>
          <div className="drop-hint">or click to browse files</div>
          <input
            ref={fileRef}
            type="file"
            accept=".pdf"
            className="file-input"
            onChange={e => handleFile(e.target.files[0])}
          />
        </div>

        {file && (
          <div className="selected-file">
            <span>📄 <span className="file-name">{file.name}</span></span>
            <span className="file-size">{(file.size / 1024).toFixed(1)} KB</span>
          </div>
        )}

        <div className="divider">ready to index</div>

        <button
          className="action-btn"
          style={{ width: '100%' }}
          disabled={!file || loading}
          onClick={upload}
        >
          {loading ? 'Uploading & Indexing...' : '↑ Upload & Index Document'}
        </button>
      </div>
    </div>
  );
}

function UrlTab({ addToast }) {
  const [url, setUrl] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!url.trim()) return;
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/add-url`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed');
      addToast('URL content indexed successfully!', 'success');
      setUrl('');
    } catch (err) {
      addToast(err.message, 'error');
    } finally {
      setLoading(false);
    }
  };

  const examples = [
    'https://en.wikipedia.org/wiki/Indian_Penal_Code',
    'https://en.wikipedia.org/wiki/Right_to_Information_Act,_2005',
  ];

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-icon">🔗</div>
        <div>
          <div className="panel-title">Add Legal Webpage</div>
        </div>
        <span className="panel-desc">Index any URL</span>
      </div>

      <div className="url-area">
        <div className="url-input-row">
          <input
            className="url-field"
            type="url"
            placeholder="https://example.com/legal-article"
            value={url}
            onChange={e => setUrl(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && submit()}
          />
          <button className="action-btn" onClick={submit} disabled={!url.trim() || loading}>
            {loading ? 'Indexing...' : '+ Add'}
          </button>
        </div>

        <div className="divider">example sources</div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {examples.map(ex => (
            <button
              key={ex}
              className="action-btn secondary"
              style={{ textAlign: 'left', fontSize: 12, padding: '10px 14px' }}
              onClick={() => setUrl(ex)}
            >
              🔗 {ex}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('chat');
  const [toasts, setToasts] = useState([]);

  const addToast = (message, type = 'info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  };

  return (
    <div className="app">
      <header className="header">
        <div className="logo">
          <div className="logo-emblem">⚖</div>
          <div>
            <div className="logo-text">Legal<span>Ease</span> India</div>
            <div className="tagline">AI-Powered Legal Research</div>
          </div>
        </div>

        <div className="nav-tabs">
          <button className={`nav-tab ${tab === 'chat' ? 'active' : ''}`} onClick={() => setTab('chat')}>
            ⚖ Ask
          </button>
          <button className={`nav-tab ${tab === 'upload' ? 'active' : ''}`} onClick={() => setTab('upload')}>
            📄 Upload
          </button>
          <button className={`nav-tab ${tab === 'url' ? 'active' : ''}`} onClick={() => setTab('url')}>
            🔗 Add URL
          </button>
        </div>
      </header>

      <div className="stats-bar">
        <div className="stat">
          <div className="stat-number">4</div>
          <div className="stat-label">Legal Acts</div>
        </div>
        <div className="stat">
          <div className="stat-number">RAG</div>
          <div className="stat-label">Powered</div>
        </div>
        <div className="stat">
          <div className="stat-number">Gemini</div>
          <div className="stat-label">LLM</div>
        </div>
        <div className="stat">
          <div className="stat-number">FastAPI</div>
          <div className="stat-label">Backend</div>
        </div>
      </div>

      <main className="main">
        {tab === 'chat' && <ChatTab addToast={addToast} />}
        {tab === 'upload' && <UploadTab addToast={addToast} />}
        {tab === 'url' && <UrlTab addToast={addToast} />}
      </main>

      <footer className="footer">
        Built by Lohith G · LegalEase India · Powered by FastAPI, LangChain & Gemini
      </footer>

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
